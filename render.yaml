databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio
    user: portfolio_user

services:
  - type: web
    name: portfolio-backend
    plan: free
    runtime: docker
    dockerfilePath: ./portfolio/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionURI
      - key: DATABASE_USERNAME
        fromDatabase:
          name: portfolio-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: portfolio-db
          property: password
      - key: FRONTEND_URL
        value: https://geet-portfolio.vercel.app